<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Notes Saver — A premium workspace." />
  <meta name="theme-color" content="#09090b" />
  <title>Notes Saver — Workspace</title>
  
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mnemos" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Premium Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- DOMPurify for HTML sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/notelist.css" />
  <link rel="stylesheet" href="css/editor.css" />
  <link rel="stylesheet" href="css/palette.css" />
</head>
<body>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle sidebar">
    <i class="ph ph-list" style="font-size:24px;"></i>
  </button>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ==================== APP ==================== -->
  <div id="app">

    <!-- ══════ SIDEBAR ══════ -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Note categories">

      <!-- Brand -->
      <div class="sidebar-header">
        <div class="sidebar-logo"><i class="ph-duotone ph-notebook" style="font-size:24px;"></i></div>
        <div class="sidebar-brand">
          <h1>Notes Saver</h1>
          <span>Premium Workspace</span>
        </div>
      </div>

      <!-- Search -->
      <div class="sidebar-search">
        <div class="search-wrapper">
          <span class="search-icon"><i class="ph ph-magnifying-glass" style="font-size:16px;"></i></span>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search notes..."
            aria-label="Search notes"
            autocomplete="off"
          />
          <button class="search-clear" id="search-clear" aria-label="Clear search"><i class="ph ph-x" style="font-size:14px;"></i></button>
        </div>
      </div>

      <!-- Scrollable Content -->
      <div class="sidebar-content">

        <!-- Folders Section -->
        <div class="sidebar-section">
          <div class="section-header">
            <span class="section-title">Folders</span>
            <button class="section-action" id="add-folder-btn" title="New folder" aria-label="Create new folder">
              <i class="ph-bold ph-plus" style="font-size:14px;"></i>
            </button>
          </div>
          <div id="folders-list"></div>
        </div>

        <!-- Tags Section -->
        <div class="sidebar-section">
          <div class="section-header">
            <span class="section-title">Tags</span>
          </div>
          <div class="tags-cloud" id="tags-cloud"></div>
        </div>

      </div>

      <!-- Footer -->
      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <div class="theme-toggle-knob"><i class="ph-duotone ph-moon" style="font-size:16px;"></i></div>
        </button>
        <div class="sidebar-footer-actions">
          <button class="sidebar-footer-btn" id="auth-btn" title="Sign In / Sync" aria-label="Sign In">
            <i class="ph-duotone ph-user-circle" style="font-size:20px;"></i>
          </button>
          <button class="sidebar-footer-btn" id="import-btn" title="Import notes" aria-label="Import notes"><i class="ph-duotone ph-download-simple" style="font-size:20px;"></i></button>
          <button class="sidebar-footer-btn" id="export-btn" title="Export notes" aria-label="Export notes"><i class="ph-duotone ph-upload-simple" style="font-size:20px;"></i></button>
          <button class="sidebar-footer-btn" id="shortcuts-btn" title="Keyboard shortcuts" aria-label="Keyboard shortcuts" onclick="window.ShortcutManager._showShortcutsModal()">
            <i class="ph-duotone ph-keyboard" style="font-size:20px;"></i>
          </button>
        </div>
      </div>
    </aside>

    <!-- ══════ NOTE LIST ══════ -->
    <section class="notelist" aria-label="Notes list">

      <!-- Header -->
      <div class="notelist-header">
        <div class="notelist-header-left" style="display:flex; align-items:center; gap:8px;">
          <button class="sidebar-toggle-btn desktop-only tooltip-btn" id="sidebar-toggle-btn" aria-label="Toggle Sidebar" title="Toggle Sidebar (Cmd+\)">
            <i class="ph ph-sidebar-simple" style="font-size:20px;"></i>
          </button>
          <span class="notelist-title">All Notes</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="notelist-count" id="notelist-count">0</span>
          <button class="new-note-btn" id="new-note-btn" title="New note (Ctrl+N)" aria-label="Create new note">
            <i class="ph-bold ph-plus" style="font-size:20px;"></i>
          </button>
        </div>
      </div>

      <!-- Sort Bar -->
      <div class="notelist-sort">
        <button class="sort-btn active" data-sort="updated" aria-label="Sort by recent">Recent</button>
        <button class="sort-btn" data-sort="title" aria-label="Sort alphabetically">A–Z</button>
        <button class="sort-btn" data-sort="created" aria-label="Sort by creation date">Created</button>
      </div>

      <!-- Note Cards -->
      <div class="notelist-cards" id="notes-container"></div>

      <!-- Empty State -->
      <div class="notelist-empty" id="notelist-empty" style="display: none;"></div>

    </section>

    <!-- ══════ EDITOR ══════ -->
    <main class="editor-panel" role="main">

      <!-- Empty Editor State -->
      <div class="editor-empty" id="editor-empty-state">
        <div class="editor-empty-icon"><i class="ph-duotone ph-pencil-simple" style="font-size:64px;"></i></div>
        <h2>Select a note to start editing</h2>
        <p>Choose a note from the list or create a new one</p>
        <div class="editor-empty-shortcuts">
          <div class="shortcut-hint"><kbd class="kbd">Ctrl+N</kbd><span>New note</span></div>
          <div class="shortcut-hint"><kbd class="kbd">Ctrl+F</kbd><span>Search</span></div>
          <div class="shortcut-hint"><kbd class="kbd">Ctrl+/</kbd><span>All shortcuts</span></div>
        </div>
      </div>

      <!-- Active Editor -->
      <div id="editor-active" style="display: none; flex-direction: column; height: 100%;">

        <!-- Editor Header -->
        <div class="editor-header">
          <div class="editor-header-left">
            <button class="mobile-back-btn" id="mobile-back-btn" aria-label="Back to list"><i class="ph-bold ph-arrow-left" style="font-size:20px;"></i></button>
          </div>
          <div class="editor-header-actions">
            <!-- Layout Toggles -->
            <button class="editor-action-btn" id="full-width-btn" title="Toggle Full Width" aria-label="Toggle Full Width"><i class="ph-bold ph-arrows-out" style="font-size:18px;"></i></button>
            <button class="editor-action-btn" id="theme-picker-btn" title="Note Theme" aria-label="Note Theme"><i class="ph-bold ph-palette" style="font-size:18px;"></i></button>
            
            <div class="toolbar-divider" style="height: 20px; margin: 0 8px;"></div>

            <button class="editor-action-btn" id="copy-btn" title="Copy to clipboard" aria-label="Copy to clipboard"><i class="ph-bold ph-copy" style="font-size:18px;"></i></button>
            <button class="editor-action-btn" id="share-btn" title="Share note" aria-label="Share note"><i class="ph-bold ph-share-network" style="font-size:18px;"></i></button>
            <button class="editor-action-btn" id="pin-btn" title="Pin note" aria-label="Pin note"><i class="ph-bold ph-push-pin" style="font-size:18px;"></i></button>
            <button class="editor-action-btn" id="delete-note-btn" title="Delete note" aria-label="Delete note"><i class="ph-bold ph-trash" style="font-size:18px;"></i></button>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="editor-toolbar" role="toolbar" aria-label="Formatting options">
          <!-- Undo/Redo -->
          <button class="toolbar-btn" data-command="undo" title="Undo (Ctrl+Z)" aria-label="Undo"><i class="ph-bold ph-arrow-u-up-left" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="redo" title="Redo (Ctrl+Y)" aria-label="Redo"><i class="ph-bold ph-arrow-u-up-right" style="font-size: 16px;"></i></button>
          <div class="toolbar-divider"></div>

          <select class="toolbar-select" id="heading-select" title="Heading level" aria-label="Select heading level">
            <option value="">Text Level</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
            <option value="p">Paragraph</option>
          </select>
          <div class="toolbar-divider"></div>

          <!-- Basic Format -->
          <button class="toolbar-btn" data-command="bold" title="Bold (Ctrl+B)" aria-label="Bold"><i class="ph-bold ph-text-b" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="italic" title="Italic (Ctrl+I)" aria-label="Italic"><i class="ph-bold ph-text-italic" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="underline" title="Underline (Ctrl+U)" aria-label="Underline"><i class="ph-bold ph-text-underline" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="strikeThrough" title="Strikethrough" aria-label="Strikethrough"><i class="ph-bold ph-text-strikethrough" style="font-size: 16px;"></i></button>
          
          <div class="toolbar-divider"></div>

          <!-- Alignment -->
          <button class="toolbar-btn" data-command="justifyLeft" title="Align Left" aria-label="Align Left"><i class="ph-bold ph-text-align-left" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="justifyCenter" title="Align Center" aria-label="Align Center"><i class="ph-bold ph-text-align-center" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="justifyRight" title="Align Right" aria-label="Align Right"><i class="ph-bold ph-text-align-right" style="font-size: 16px;"></i></button>
          
          <div class="toolbar-divider"></div>

          <!-- Color Lookups -->
          <button class="toolbar-btn" id="text-color-btn" title="Text Color" aria-label="Text Color"><i class="ph-bold ph-palette" style="font-size: 16px; color: var(--accent-primary);"></i></button>
          <button class="toolbar-btn" id="bg-color-btn" title="Highlight Color" aria-label="Highlight Color"><i class="ph-bold ph-highlighter-circle" style="font-size: 16px; color: var(--accent-warning);"></i></button>
          <input type="color" id="text-color-input" style="display: none;" />
          <input type="color" id="bg-color-input" style="display: none;" />

          <div class="toolbar-divider"></div>

          <!-- Lists & Blocks -->
          <button class="toolbar-btn" data-command="insertUnorderedList" title="Bullet list" aria-label="Bullet list"><i class="ph-bold ph-list-bullets" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="insertOrderedList" title="Numbered list" aria-label="Numbered list"><i class="ph-bold ph-list-numbers" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="formatBlock" data-value="blockquote" title="Quote" aria-label="Quote"><i class="ph-bold ph-quotes" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="formatBlock" data-value="pre" title="Code block" aria-label="Code block"><i class="ph-bold ph-code" style="font-size: 16px;"></i></button>
          
          <div class="toolbar-divider"></div>

          <!-- Inserts -->
          <button class="toolbar-btn" data-command="createLink" title="Insert link" aria-label="Insert link"><i class="ph-bold ph-link" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" id="insert-table-btn" title="Insert table" aria-label="Insert table"><i class="ph-bold ph-table" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" id="insert-image-btn" title="Insert image" aria-label="Insert image"><i class="ph-bold ph-image" style="font-size: 16px;"></i></button>
          <input type="file" id="image-upload-input" accept="image/*" style="display: none;" aria-hidden="true" />
          
          <div class="toolbar-divider"></div>

          <!-- Utilities -->
          <button class="toolbar-btn" data-command="insertHorizontalRule" title="Horizontal rule" aria-label="Insert horizontal rule"><i class="ph-bold ph-minus" style="font-size: 16px;"></i></button>
          <button class="toolbar-btn" data-command="removeFormat" title="Clear formatting" aria-label="Clear formatting"><i class="ph-bold ph-eraser" style="font-size: 16px;"></i></button>
        </div>

        <!-- Title -->
        <div class="editor-title-wrapper">
          <input
            type="text"
            id="editor-title"
            class="editor-title"
            placeholder="Note title..."
            aria-label="Note title input"
            autocomplete="off"
          />
        </div>

        <!-- Tags -->
        <div class="editor-tags-wrapper">
          <div id="editor-tags" aria-live="polite"></div>
          <input
            type="text"
            id="tag-input"
            class="tag-input"
            placeholder="Add tag..."
            aria-label="Tag input"
            autocomplete="off"
          />
        </div>

        <!-- Content -->
        <div class="editor-body-wrapper" id="editor-body-wrapper">
          <!-- Selection Floating Bubble -->
          <div id="floating-bubble" class="floating-bubble" style="display: none;">
            <button class="bubble-btn" data-command="bold" title="Bold"><i class="ph ph-text-b"></i></button>
            <button class="bubble-btn" data-command="italic" title="Italic"><i class="ph ph-text-italic"></i></button>
            <button class="bubble-btn" data-command="createLink" title="Link"><i class="ph ph-link"></i></button>
            <div class="bubble-divider"></div>
            <button class="bubble-btn" data-command="formatBlock" data-value="blockquote" title="Quote"><i class="ph ph-quotes"></i></button>
          </div>

          <!-- 🧩 Unified Block Manipulation Toolbar (Contextual) -->
          <div id="block-toolbar" class="block-toolbar" style="display:none;">
            <!-- ... (existing tools) ... -->
            <div class="block-tool-group" data-type="image">
              <button class="block-tool-btn" data-action="size-sm" title="Small (25%)">S</button>
              <button class="block-tool-btn" data-action="size-md" title="Medium (50%)">M</button>
              <button class="block-tool-btn" data-action="size-lg" title="Large (100%)">L</button>
            </div>
            <div class="block-tool-group" data-type="table">
              <button class="block-tool-btn" data-action="add-row" title="Add Row Below"><i class="ph ph-rows"></i></button>
              <button class="block-tool-btn" data-action="add-col" title="Add Column Right"><i class="ph ph-columns"></i></button>
            </div>
            <div class="bubble-divider"></div>
            <button class="block-tool-btn" data-action="align-left" title="Align Left"><i class="ph ph-align-left"></i></button>
            <button class="block-tool-btn" data-action="align-center" title="Align Center"><i class="ph ph-align-center"></i></button>
            <button class="block-tool-btn" data-action="align-right" title="Align Right"><i class="ph ph-align-right"></i></button>
            <div class="bubble-divider"></div>
            <button class="block-tool-btn trash" data-action="delete" title="Purge Asset"><i class="ph ph-trash"></i></button>
          </div>

          <!-- 💠 Direct Manipulation Overlays (Pro) -->
          <div id="block-drag-handle" class="block-drag-handle" style="display:none;" draggable="true" title="Drag to reorder">
            <i class="ph ph-dots-six-vertical"></i>
          </div>
          <div id="block-resizer" class="block-resizer" style="display:none;"></div>
          <div id="drop-indicator" class="drop-indicator" style="display:none;"></div>

          <div id="slash-menu" class="slash-menu" style="display:none;">
            <div class="slash-menu-title">Commands</div>
            <div id="slash-menu-items"></div>
          </div>

          <div
            id="editor-body"
            class="editor-body"
            contenteditable="true"
            spellcheck="true"
            role="textbox"
            aria-multiline="true"
            aria-label="Note content editable area"
            data-placeholder="Start typing or press '/' for commands..."
          ></div>
        </div>

        <!-- Footer -->
        <div class="editor-footer">
          <div class="editor-stats">
            <span id="word-count">0 words</span>
            <span id="char-count">0 chars</span>
          </div>
          <div class="editor-save-status">
            <span class="save-dot" aria-hidden="true"></span>
            <span id="save-status-label" aria-live="polite">Saved</span>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- ══════ TOAST CONTAINER ══════ -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ══════ MODAL ══════ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal"></div>
  </div>

  <!-- ══════ COMMAND PALETTE ══════ -->
  <div class="palette-overlay" id="palette-overlay" role="dialog" aria-modal="true">
    <div class="palette-modal">
      <div class="palette-header">
        <i class="ph-bold ph-magnifying-glass palette-icon"></i>
        <input type="text" id="palette-input" class="palette-input" placeholder="Search commands, notes, and tags..." aria-label="Command Palette Search">
        <span class="palette-hint">esc</span>
      </div>
      <div class="palette-content" id="palette-results">
        <!-- Results injected dynamically -->
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/search.js"></script>
  <script src="js/error-handler.js"></script>
  <script src="js/sync-manager.js"></script>
  <script src="js/palette.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/notelist.js"></script>
  <script src="js/shortcuts.js"></script>
  <script src="js/app.js"></script>

  <!-- 🚀 SERVICE WORKER REGISTRATION -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('☁️ Service Worker Registered (Pro Mode)'))
          .catch(err => console.log('SW Registration failed:', err));
      });
    }
  </script>

</body>
</html>
